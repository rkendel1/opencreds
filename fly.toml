# fly.toml app configuration file generated for opencreds on 2026-07-12T12:52:47Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'opencreds'
primary_region = 'iad'

[build]
  dockerfile = 'docker/Dockerfile'

[env]
  HOST = '0.0.0.0'
  NODE_ENV = 'production'
  OOMOL_CONNECT_DATA_DIR = '/app/data'
  PORT = '8080'

[[mounts]]
  source = 'open_connector_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'
    protocol = 'http'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
